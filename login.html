<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Perfume | Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Montserrat', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
   
}

/* overlay */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* container */
.wrapper{
    position:relative;
    width:380px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:15px;
    padding:30px;
    color:#fff;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* toggle buttons */
.toggle{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.toggle button{
    width:50%;
    padding:10px;
    cursor:pointer;
    border:none;
    background:transparent;
    color:#fff;
    font-weight:600;
    border-bottom:2px solid transparent;
    transition:0.3s;
}

.toggle button.active{
    border-bottom:2px solid #fff;
}

/* forms */
form{
    display:none;
    flex-direction:column;
    gap:15px;
}

form.active{
    display:flex;
}

input{
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
}

.btn{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#16ff00;
    color:#000;
    font-weight:700;
    cursor:pointer;
}

.btn:hover{
    opacity:0.8;
}

.text{
    text-align:center;
    margin-top:10px;
    font-size:14px;
}

.social-login{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
}

.social-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.google{
    background:#fff;
    color:#000;
}

.facebook{
    background:#1877f2;
    color:#fff;
}

.social-btn:hover{
    transform:scale(1.03);
}


.video-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
    overflow:hidden;
}

.video-bg video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* darker smoke effect */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}
</style>

</head>
<body>

<!-- SMOKE VIDEO BACKGROUND -->
<div class="video-bg">
    <video autoplay muted loop>
        <source src="image/Smoke_Smok.mp4" type="video/mp4">
    </video>
</div>

<div class="overlay"></div>

<div class="overlay"></div>

<div class="wrapper">

    <div class="toggle">
        <button id="loginBtn" class="active">Sign In</button>
        <button id="signupBtn">Sign Up</button>
    </div>

    <!-- SIGN IN -->
  <!-- SIGN IN -->
<form id="loginForm" class="active">
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>

    <button class="btn">Login</button>

    <p class="text">or continue with</p>

    <!-- SOCIAL LOGIN -->
    <div class="social-login">

        <button type="button" class="social-btn google">
            <i class="fab fa-google"></i> Sign in with Google
        </button>

        <button type="button" class="social-btn facebook">
            <i class="fab fa-facebook-f"></i> Sign in with Facebook
        </button>

    </div>

    <p class="text">Don't have an account? Sign up</p>
</form>

    <!-- SIGN UP -->
    <form id="signupForm">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button class="btn">Create Account</button>
        <p class="text">Already have an account? Sign in</p>
    </form>

</div>

<script>
const loginBtn = document.getElementById("loginBtn");
const signupBtn = document.getElementById("signupBtn");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");

loginBtn.onclick = () => {
    loginBtn.classList.add("active");
    signupBtn.classList.remove("active");
    loginForm.classList.add("active");
    signupForm.classList.remove("active");
};

signupBtn.onclick = () => {
    signupBtn.classList.add("active");
    loginBtn.classList.remove("active");
    signupForm.classList.add("active");
    loginForm.classList.remove("active");
};




</script>
<script>
document.querySelector(".google").onclick = () => {
    alert("Google Login coming soon");
};

document.querySelector(".facebook").onclick = () => {
    alert("Facebook Login coming soon");
};
</script>

    const email = this.querySelector("input[type=email]").value;

    // ADMIN LOGIN

    alert("Admin login successful!");

    if(password !== userData.password){
        alert("Wrong password!");

    }

    // SUCCESS LOGIN
  // SUCCESS LOGIN
// SUCCESS LOGIN
localStorage.setItem("isLoggedIn", "true");
localStorage.setItem("role", "user");
localStorage.setItem("userEmail", email);

// 🔥 IMPORTANT: ALWAYS LOAD FROM STORED ACCOUNT

alert("Login successful!");
window.location.href = "index.html";

<script>
document.getElementById("signupForm").addEventListener("submit", function(e){
    e.preventDefault();

    const name = this.querySelector("input[type=text]").value;
    const email = this.querySelector("input[type=email]").value;
    const password = this.querySelector("input[type=password]").value;

    // check if already registered
    if(localStorage.getItem(email)){
        alert("Account already exists! Please login.");
        return;
    }

    // save account
 const userData = {
    name: name,
    fullName: name,
    email: email,
    password: password,
    phone: "Not set",
    address: "Not set",
    regDate: new Date().toLocaleDateString("en-US"),
    role: "User"
};

/* save login account */
/* save account */
localStorage.setItem(email, JSON.stringify(userData));

/* save current user data */
localStorage.setItem("user", JSON.stringify(userData));

/* save to admin users table */
let users = JSON.parse(localStorage.getItem("users")) || [];

/* FIX: normalize email para walang duplicate */
const emailKey = email.trim().toLowerCase();

const alreadyExists = users.find(u =>
  (u.email || "").trim().toLowerCase() === emailKey
);

if (!alreadyExists) {
    users.push({
        name: name,
        email: email,
        number: "Not set",
        role: "User"
    });

    localStorage.setItem("users", JSON.stringify(users));
}

    alert("Account created! Please login.");

    // lipat sa login form
    loginBtn.click();
});
</script>

</body></html>
