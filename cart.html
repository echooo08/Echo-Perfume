<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | NoirScent</title>

    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
        }

        .cart-container {
            padding: 120px 10%;
        }

        .cart-title {
            font-size: 42px;
            font-family: 'Cinzel', serif;
            margin-bottom: 30px;
        }

        .cart-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        .cart-items {
            background: #111;
            padding: 25px;
            border-radius: 12px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding: 20px 0;
        }

        .cart-item img {
            width: 80px;
            border-radius: 10px;
        }

        .item-info {
            flex: 1;
            margin-left: 20px;
        }

        .item-price {
            font-weight: bold;
            margin-right: 20px;
        }

        .cart-summary {
            background: #111;
            padding: 25px;
            border-radius: 12px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #ccc;
        }

        .summary-total {
            font-weight: bold;
            font-size: 18px;
            color: #fff;
        }

        .checkout-btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #d4af37;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }

        .cart-header-top {
    display: flex;
    align-items: center;
    justify-content:space-between;
    padding: 20px 10%;
    margin-top: 20px;
}

.back-btn {
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover {
    background: #d4af37;
    color: #000;
}

.cart-header-top h1 {
    font-size: 32px;
    font-family: 'Cinzel', serif;
    margin: 0;
}

/* RESPONSIVE DESIGN */
@media (max-width: 768px) {

    .cart-container {
        padding: 100px 5%;
    }

    .cart-title {
        font-size: 28px;
        text-align: center;
    }

    .cart-grid {
        grid-template-columns: 1fr;
    }

    .cart-header-top {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }

    .cart-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .item-info {
        margin-left: 0;
    }

    .qty-controls {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .cart-summary {
        margin-top: 20px;
    }

    .checkout-btn {
        font-size: 16px;
    }
}

.item-check {
    width: 18px;
    height: 18px;
    margin-right: 10px;
    accent-color: #d4af37;
    cursor: pointer;
}
    </style>
</head>

<body>

    <!-- HEADER TOP -->
<div class="cart-header-top">
    <button class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <h1 class="cart-title">My Cart</h1>
</div>

<div class="cart-container">
    <h1 class="cart-title">t</h1>

    <div class="cart-grid">

        <!-- ✅ EMPTY CONTAINER (IMPORTANT) -->
        <div class="cart-items"></div>

        <!-- SUMMARY -->
        <div class="cart-summary">
            <h3>Order Summary</h3>

            <div class="summary-item">
                <span>Subtotal</span>
                <span class="subtotal">₱0</span>
            </div>

            <div class="summary-item">
                <span>Shipping</span>
                <span class="shipping">₱0</span>
            </div>

            <div class="summary-item summary-total">
                <span>Total</span>
                <span class="total">₱0</span>
            </div>

            <button class="checkout-btn" onclick="checkoutSelected()">
                Proceed to Checkout
            </button>
        </div>

    </div>
</div>

<script>
const cartContent = document.querySelector(".cart-items");
const subtotalEl = document.querySelector(".subtotal");
const totalEl = document.querySelector(".total");
const shippingEl = document.querySelector(".shipping");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart = cart.map(item => ({
    ...item,
    quantity: item.quantity || 1,
    checked: item.checked ?? true
}));

document.addEventListener("change", function(e) {
    if (e.target.classList.contains("item-check")) {
        let index = e.target.dataset.index;

        cart[index].checked = e.target.checked;

        localStorage.setItem("cart", JSON.stringify(cart));

        displayCart(); // 🔥 IMPORTANT: refresh totals + UI
    }
});

function displayCart() {
    cartContent.innerHTML = "";

    let total = 0;
    let hasItem = false;

    if (cart.length === 0) {
        cartContent.innerHTML = "<p>Your cart is empty</p>";
        subtotalEl.innerText = "₱0";
        totalEl.innerText = "₱0";
        return;
    }

    cart.forEach((item, index) => {


       let priceNumber = Number(item.price.replace(/[^0-9.]/g, ""));
        let subtotal = priceNumber * item.quantity;

        // ✅ CHECKED ITEMS ONLY ang total
        if (item.checked) {
            total += subtotal;
            hasItem = true;
        }

        cartContent.innerHTML += `
        <div class="cart-item">
            <input type="checkbox" class="item-check" data-index="${index}" 
            ${item.checked ? "checked" : ""}>

            <img src="${item.img}">

            <div class="item-info">
                <h4>${item.name}</h4>
                <p>${item.price}</p>
            </div>

            <div class="qty-controls">
                <button onclick="decreaseQty(${index})">−</button>
                <span>${item.quantity}</span>
                <button onclick="increaseQty(${index})">+</button>
            </div>

            <div class="item-price">₱${subtotal.toFixed(2)}</div>

            <i class="fas fa-trash" onclick="removeItem(${index})"></i>
        </div>
        `;
    });

    let selectedCount = cart.filter(item => item.checked).length;
let shipping = selectedCount * 99;

// kung walang selected, walang shipping
if (selectedCount === 0) {
    shipping = 0;
}

subtotalEl.innerText = "₱" + total.toFixed(2);
totalEl.innerText = "₱" + (total + shipping).toFixed(2);

if (shippingEl) {
    shippingEl.innerText = "₱" + shipping.toFixed(2);
}


}

// 🗑 REMOVE ITEM
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

displayCart();

function increaseQty(index) {
    cart[index].quantity += 1;
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
    syncCartToDrawer();
}

function decreaseQty(index) {
    cart[index].quantity -= 1;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}


function getSelectedItems() {
    return cart.filter(item => item.checked);
}

function checkoutSelected() {
    let selectedItems = cart.filter(item => item.checked);

    if (selectedItems.length === 0) {
        alert("Please select items to checkout");
        return;
    }

    localStorage.setItem("checkoutCart", JSON.stringify(selectedItems));

    window.location.href = "checkout.html";
}

function syncCartToDrawer() {
    // triggers update kapag bumalik ka sa main page or drawer
    const event = new Event("storage");
    window.dispatchEvent(event);
}


window.addEventListener("storage", () => {
    cart = JSON.parse(localStorage.getItem("cart")) || [];
    updateCartUI?.();
    displayCart?.();
});
</script>

</body></html>
