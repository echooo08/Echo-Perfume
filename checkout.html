<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | NoirScent</title>

    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: #0b0b0b;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
        }

        .checkout-container {
            padding: 120px 10%;
        }

        .checkout-title {
            font-size: 40px;
            font-family: 'Cinzel', serif;
            margin-bottom: 30px;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        /* FORM */
        .checkout-form {
            background: #111;
            padding: 25px;
            border-radius: 12px;
        }

        .checkout-form h3 {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: none;
            color: #fff;
            border-radius: 6px;
        }

        /* ORDER SUMMARY */
        .order-summary {
            background: #111;
            padding: 25px;
            border-radius: 12px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #ccc;
        }

        .summary-total {
            font-weight: bold;
            font-size: 18px;
            color: #fff;
        }

        .place-order {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            background: #d4af37;
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }

        .place-order:hover {
            opacity: 0.9;
        }

        .cart-item {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 15px;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
}

.cart-item img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 6px;
}

.cart-info {
    flex: 1;
}

.qty {
    color: #aaa;
    font-size: 13px;
}


.checkout-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 10%;
    margin-top: 20px;
}

.checkout-title {
    font-size: 32px;
    font-family: 'Cinzel', serif;
    margin: 0;
    flex: 1;
    text-align: center;
}

.back-btn {
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.back-btn:hover {
    background: #d4af37;
    color: #000;
}

    </style>
</head>

<body>

<div class="checkout-header-top">
    <button class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Back
    </button>

    <h1 class="checkout-title">Checkout</h1>
</div>

<div class="checkout-container">
    <h1 class="checkout-title"></h1>

    <div class="checkout-grid">

        <!-- LEFT FORM -->
        <div class="checkout-form">
            <h3>Billing Details</h3>

            <div class="form-group">
                <input type="text" placeholder="Full Name">
            </div>

            <div class="form-group">
                <input type="email" placeholder="Email Address">
            </div>

            <div class="form-group">
                <input type="text" placeholder="Address">
            </div>

            <div class="form-group">
                <input type="text" placeholder="City">
            </div>

            <div class="form-group">
                <input type="text" placeholder="ZIP Code">
            </div>

            <div class="form-group">
                <select>
                    <option>Payment Method</option>
                    <option>Credit Card</option>
                    <option>GCash</option>
                    <option>Cash on Delivery</option>
                </select>
            </div>
        </div>

<div class="order-summary">
    <h3>Your Order</h3>

    <div id="cart-items"></div>

    <div class="summary-item">
        <span>Shipping</span>
        <span id="shipping">$10</span>
    </div>

    <div class="summary-item summary-total">
        <span>Total</span>
        <span id="total-price">$0</span>
    </div>

    <button class="place-order">Place Order</button>
</div>

    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// fallback para sa price parsing
function getPrice(item) {
    if (!item.price) return 0;

    if (typeof item.price === "number") return item.price;

    return parseFloat(
        item.price
            .toString()
            .replace("$", "")
            .replace(",", "")
    ) || 0;
}

// FIXED SHIPPING (same as cart page)
function getShipping(subtotal) {
    return 10; // fixed shipping
}

function renderCart() {
    const container = document.getElementById("cart-items");

    let subtotal = 0;

    container.innerHTML = "";

    if (!cart.length) {
        container.innerHTML = "<p style='color:#aaa'>Your cart is empty</p>";
        document.getElementById("shipping").innerText = "$0";
        document.getElementById("total-price").innerText = "$0";
        return;
    }

    cart.forEach(item => {
        const price = getPrice(item);
        const qty = item.quantity || 1;

        const itemTotal = price * qty;
        subtotal += itemTotal;

        container.innerHTML += `
            <div class="cart-item">
                <img src="${item.img}" alt="">
                <div class="cart-info">
                    <div>${item.name}</div>
                    <div class="qty">Qty: ${qty}</div>
                </div>
                <div>$${itemTotal.toFixed(2)}</div>
            </div>
        `;
    });

    // SHIPPING
    let shipping = getShipping(subtotal);

    // GRAND TOTAL
    let grandTotal = subtotal + shipping;

    // DISPLAY
    document.getElementById("shipping").innerText = "$" + shipping;
    document.getElementById("total-price").innerText = "$" + grandTotal.toFixed(2);
}

// INIT
renderCart();

// auto update if cart changes from other pages
window.addEventListener("storage", (e) => {
    if (e.key === "cart") {
        cart = JSON.parse(localStorage.getItem("cart")) || [];
        renderCart();
    }
});
</script>
</body>
</html>
